<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Victor Velma - Home</title>
        <link rel="stylesheet" href="{{ url_for('static', path='/css/output.css') }}">
    </head>
    <body class="flex flex-col min-h-screen bg-zinc-50 text-zinc-900">

    <header class="bg-white border-b border-zinc-200">
        <nav class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="/" class="text-xl font-bold tracking-tighter hover:text-blue-600 transition-colors">
                victor.dev
            </a>

            <ul class="flex space-x-8 font-medium text-zinc-600">
                <li><a href="/" class="hover:text-zinc-900">Home</a></li>
                <li><a href="/about" class="hover:text-zinc-900">About</a></li>
                <li><a href="/blog" class="hover:text-zinc-900">Blog</a></li>
            </ul>
        </nav>
    </header>

    <main class="flex-grow max-w-5xl mx-auto w-full px-4 py-12">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-zinc-900 text-zinc-400 py-12">
        <div class="max-w-5xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center">
            <p class="text-sm">© 2026 Victor Velma. Built with FastAPI & Tailwind v4.</p>
            <div class="flex space-x-6 mt-4 md:mt-0">
                <a href="https://github.com" class="hover:text-white">GitHub</a>
                <a href="https://linkedin.com" class="hover:text-white">LinkedIn</a>
            </div>
        </div>
    </footer>
    </body>
</html>
